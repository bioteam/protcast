name: Run Tests

# Trigger the workflow on push or pull request to the main branch. Also allow manual runs.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit & fast tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11" ]

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt','**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (create venv + install package)
        run: |
          python -m pip install --upgrade pip
          # create and activate a virtualenv to mimic local workflow
          python -m venv .venv
          source .venv/bin/activate
          # install pinned requirements if present
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # install package the same way you do locally (include dev extras)
          if [ -f pyproject.toml ] || [ -f setup.py ]; then python -m pip install '.[dev]'; fi

      - name: Run unit & fast tests (skip integration)
        run: |
          # Skip tests marked with @pytest.mark.integration
          pytest test/ -v -m "not integration" --maxfail=1
        env:
          PYTHONWARNINGS: default

  integration-tests:
    name: Integration tests (network)
    runs-on: ubuntu-latest
    # Only run integration tests on main branch pushes or when manually triggered.
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt','**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (create venv + install package)
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          source .venv/bin/activate
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then python -m pip install '.[dev]'; fi

      - name: Run integration tests
        run: |
          # Integration tests are expected to be marked with @pytest.mark.integration
          pytest test/ -v -m integration --maxfail=1
        env:
          PYTHONWARNINGS: default

