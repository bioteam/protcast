[build-system]
requires = ["setuptools>=45", "setuptools_scm[toml]>=6.2", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ProtCast"
version = "0.0.1"
description = "Protein function prediction based on sequence"
authors = [{ name = "Brian Osborne", email = "briano@bioteam.net" }, {name = "Bruno Alvisio", email = "contact@bioteam.net"}]
requires-python = ">=3.9.2"
dependencies = [
    "plotly",
    "kaleido",
    "numpy",
    "numba",
    "typeguard",
    "scikit-learn",
    "tqdm",
    "tensorflow",
    "biopython",
    "ifeatpro",
    "goatools",
    "pandas",
    "keras"
]

[tool.setuptools]
packages = ["protcast"]
